version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackathon-php-fpm
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Hackathon2026
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: hackathon2026
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_DRIVER: file
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - hackathon_network

  nginx:
    image: nginx:alpine
    container_name: hackathon-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hackathon_network

  db:
    image: postgres:14-alpine
    container_name: hackathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackathon2026
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d hackathon2026"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hackathon_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: hackathon-pgadmin
    restart: unless-stopped
    ports:
      - "8889:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: secret
    depends_on:
      - db
    networks:
      - hackathon_network

volumes:
  db_data:

networks:
  hackathon_network:
    driver: bridge
