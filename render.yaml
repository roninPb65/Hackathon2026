services:
  # Laravel App
  - type: web
    name: hackathon2026-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Hackathon2026
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: hackathon2026-app
          property: host
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: hackathon2026-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hackathon2026-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hackathon2026-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hackathon2026-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hackathon2026-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr

# Free PostgreSQL database
databases:
  - name: hackathon2026-db
    plan: free
    databaseName: hackathon2026
    user: laravel
